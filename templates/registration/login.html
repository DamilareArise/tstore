{% extends "common.html" %}
 {% block title %} Tstore-login {% endblock title %}
    {% block content %}
    {% load static %}
    {% load crispy_forms_tags %}

    <div class="container mt-5 col-10 col-md-4 border p-3 rounded">
        <h3 class="text-center">Login Form</h3>
        <form method="post">
            {% csrf_token %}

            {{form|crispy}}
            <button class="btn btn-dark">Login</button>
            <hr>
            <div class="d-flex justify-content-between">
                <a href="" class="text-decoration-none text-black">Forgot password?</a>
                <a href="" class="text-decoration-none text-black">Create account</a>
            </div>
        </form>
    </div>

    {% endblock %}
