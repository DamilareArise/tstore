{% extends "common.html" %}
 {% block title %} Tstore-login {% endblock title %}
    {% block content %}
    {% load static %}
    {% load crispy_forms_tags %}

    <div class="container mt-5 col-10 col-md-5 border p-3 rounded">
        <h3 class="text-center">Signup Form</h3>
        <form method="post">
            {% csrf_token %}

            {{form|crispy}}
            <button class="btn btn-dark">Sign up</button>
            <hr>
            <div class="d-flex justify-content-between">
                <p class="text-decoration-none text-black">Already have an account?</p>
                <a href="{% url "login" %}" class="text-decoration-none text-black">Login</a>
            </div>
        </form>
    </div>

    {% endblock %}
